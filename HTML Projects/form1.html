<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form1</title>
</head>
<body>
    <h1>Event Registration</h1>
    <form>
        <label for="name"> Name: <br/>
            <input id="name" type="text" name="Name">
        </label>
        <br/>
        <label for="email">
            Email:  <br/>
            <input type="email" name="email" id="email"> <br/>
        </label>
        <label for="tel"> Phone: <br/>
            <input type="tel" name="tel" id="tel"> <br/>
        </label>
        <label for="occupation"> Occupation: <br/>
            <select name="occupation" id="occupation">
                <option value="other"> Other </option>
                <option value="engineer">Engineer</option> <br/>
            </select>
        </label><br/>
        Topics for interest: <br/>
         <input type="checkbox" name="html" id="interest1"> <br/>
        <label for="interest1">  HTML <br/></label>
        <input type="checkbox" name="css" id="interest2"> <br/>
        <label for="interest2"> CSS <br/></label>
        <input type="checkbox" name="jss" id="interest3"> <br/>
        <label for="interest3"> JavaScript <br/></label>
        <label for="comment"> Comments: <br/></label>
        <textarea name="comment" id="comment" cols="10" rows="60"></textarea>
        <button type="submit">Register</button>
    </form>
</body>
</html>
