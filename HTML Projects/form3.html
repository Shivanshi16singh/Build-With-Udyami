<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form3</title>
</head>
<body>
    <h1>Complex Form</h1>
    <fieldset>
        <legend>Personal Information</legend>
        <label for="name">Name:</label>
        <input type="text" name="name" id="name">
        <label for="email">Email:</label>
        <input type="email" name="email" id="email"> 
        <label for="phone">Phone:</label>
        <input type="tel" name="phone" id="phone">
        <label for="date">Date of Birth: </label>
        <input type="date" name="date" id="date">
        <label for="gender">Gender:</label>
        <input type="radio" name="gender" id="gender1">
        <label for="gender1">Male</label>
        <input type="radio" name="gender" id="gender2">
        <label for="gender2">Female</label>
        <label for="country">Country:</label> 
        <select name="countrt" id="country">
            <option value="India">India</option>
            <option value="Brazil">Brazil</option>
            <option value="France">France</option>
        </select>
    </fieldset>
    <fieldset>
        <legend>Address</legend>
        <label for="add">Address Street</label>
        <input type="text" name="add" id="add">
        <label for="city">City</label>
        <input type="text" name=" city" id="city">
        <label for="state">State</label>
        <input type="text" name="state" id="state">
        <label for="code">Zip Code</label>
        <input type="number" name="code" id="code">
    </fieldset>
    <fieldset>
        <legend>Other Information</legend>
        <label for="comment">Comments</label>
        <textarea name="comment" id="comment" rows="5px" cols="5px"></textarea>
        <label for="agree">I agree to the terms of service</label>
        <input type="checkbox" name="agree" id="agree">
    </fieldset>
    <br/>
    <button type="submit">Submit</button>
</body>
</html>
