<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form2</title>
</head>
<body>
    <h1>Job Application</h1>
    <form>
        <label for="name">Name: <br/></label>
        <input type="text" name="name" id="name"><br/>
        <label for="email">Email: <br/> </label>
        <input type="email" name="email" id="email"> <br/>
        <label for="phone">Phone: <br/></label>
        <input type="tel" name="phone" id="phone"> <br/>
        <label for="resume">Resume: <br/></label>
        <input type="file" name="resume" id="resume"><br/>
        <label for="experience">Experience(years):</label> <br/>
        <input type="number" name="experience" id="experience" min="0" max="50" value="0">
        
        <fieldset>
            <legend>Skills: </legend>
            <input type="checkbox" name="html" id="html"> <br/>
            <label for="html">HTML</label> <br/>
            <input type="checkbox" name="css" id="css"> <br/>
            <label for="css">CSS</label> <br/>
            <input type="checkbox" name="js" id="js"> <br/>
            <label for="js">JavaScript</label> <br>
        </fieldset>
        <label for="edu">Highest Education: </label> 
        <select name="edu" id="edu">
            <option value="High School">High School</option>
            <option value="Secondary School">Secondary School</option>
            <option value="Degree">Degree</option>
        </select> <br/>
        <label for="avail">Availability</label> <br> 
        <input type="radio" name="avail" id="avail1"><br>
        <label for="avail1">Full Time: </label><br>
        <input type="radio" name="avail" id="avail2"><br>
        <label for="avail2">Part Time</label><br>
        <label for="comment">Additional Comments: </label><br>
        <textarea name="comment" id="comment" rows="10" cols="90"></textarea>
        <button type="submit">Submit Application</button>
    </form>
</body>
</html>
