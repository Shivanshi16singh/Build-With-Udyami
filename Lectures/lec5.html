<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="lec5.css ">
</head>
<body>
    <!--
    container-> flex container
    items which are to arranges -> flex items
    two axis -> cross-axis and main axis
    cross axis-> vertical axis
    main axis -> horizontal axis
    left side -> main start
    right side -> main end
    top -> cross start
    bottom -> cross end
    flex-wrap -> when space is available it will be in same line but as the space lessens the items move to next line
    by default: no-wrap
    short hand notation-> flex-flow: <flex-direction> <flex-wrap>;
    justify content-> places the content according to the main axis
    flex direction-> row ,main axis-> row
    flex direction -> column , main axis -> column
    flex-flow: <flex-direction> <flex-wrap>
    align items-> places the content acccording to cross axis
    align content -> when the size of container is decreased, there appears 
    space between the content in the diffrent row or column 
    to reduce the space, align content is used

    properties of flex-item -> order -> to change the sequence
    flex-shrink -> x amount speed shrinked
    flex-grow -> x amount speed grow
    short hand notation: flex: <flex-grow> <flex-shrink> <flex-basis> 
    flex basis-> used for setting the dimensions
    align self -> about cross axis 
    -->
    <div class="container">
        <div class="box" id="box1">A</div>
        <div class="box" id="box2">B</div>
        <div class="box" id="box3">C</div>
        <div class="box" id="box4">D</div>
    </div>
</body>
</html>
