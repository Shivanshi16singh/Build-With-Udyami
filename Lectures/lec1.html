<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="lec1.css">
</head>
<body>
    <h1>This is heading</h1>
    <div>
        <!--You cannot apply height and width to inline elements-->
        <!-- You cannot apply margin in vertical direction
        When margin property is applied, it get applied in horizontal direction only
        padding is applied everywhere -->
        <span>Hello , my name is Shivanshi</span>
        <span>Hello , my name is Shivanshi</span>
        <span>Hello , my name is Shivanshi</span>
        <span>Hello , my name is Shivanshi</span>
        <span>Hello , my name is Shivanshi</span>
        <!-- When inline elements are dispalyed as block, all the properties of block get applied into inline  -->
        <div class="cont">Hello</div>
        <div class="cont">Hello</div>
        <div class="cont">Hello</div>
    </div>
    <div>
        <!--Here display: inline-block-->
        <!--This means the element behaves inherently like inline
        As the custom height , custom width, margin property is applied, it follows the property of block eleement
        -->
        <div class="class">Hello World</div>
        <div class="class">Hello World</div>
        <div class="class">Hello World</div>
    </div>
</body>
</html>
