<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Now</title>
    <link rel="stylesheet" href="retroreg.css">
</head>
<body>
    <form>
        <div class="container">
            <h1> Welcome Back </h1>
            <p>Please enter your details to sign in.</p>

            <label for="email">
                Email Address
                <input type="email" placeholder="Enter your email" >
            </label>

            <label for="psw">
                Password
                <input type="password" placeholder="Enter your password">
            </label>
            <br>
            
            <label for="remember">
                <input type="checkbox"> 
                Remember me
            </label>

            <a class='lnk' href="forgot">           Forgot password? </a>
            <br>
            

            <button id="btn">
                <b>Sign in</b>
            </button>
            <br>

            Don't have an account?
             <a class='lnk' href="sign">        Sign up </a> 

        </div>
    </form>
</body>
</html>
