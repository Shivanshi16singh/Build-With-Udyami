<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Coin Flip Game</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="coin.png" type="image/x-icon">
</head>
<body>
    <div class="container">
        <div class="box">
            <p id="head">Heads: 0</p>
            <p id="tail">Tails: 0</p>
        </div>
        <div class="wrap">
            <div class="coin" id="coin">
                <div class="side front">H</div>
                <div class="side back">T</div>
            </div>
        </div>
        <div class="actions">
            <button id="flip">Flip Coin</button>
            <button id="reset">Reset</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
